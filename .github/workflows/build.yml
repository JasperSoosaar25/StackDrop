name: Build

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # Java 25 is required by Minecraft 26.1.x
      - name: Set up Java 25
        uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: 'temurin'

      # gradle/actions/setup-gradle installs Gradle from gradle-wrapper.properties,
      # handles the wrapper binary itself, and provides built-in caching —
      # so there is no need for a committed gradlew binary or a separate cache step.
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: wrapper

      - name: Build mod
        run: gradle build --no-daemon

      # Upload the built JAR as a workflow artifact
      - name: Upload JAR artifact
        uses: actions/upload-artifact@v4
        with:
          name: stackdrop-${{ github.sha }}
          path: build/libs/*.jar
          if-no-files-found: error
